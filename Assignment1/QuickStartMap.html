<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' /> <!-- Contains metadata-->
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>


          
    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">

    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
      body { margin:0; padding:0; }
      #map { position:absolute; top:0; bottom:0; width:100%; }

      #banner { z-index: 9999; 
         background-color:white; 
         opacity: 80%; 
         text-align: center;
         color: purple
          }


    </style>
  </head>

  <body>
    
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
   <div id='map'>
    </div>
    <!--  Insert the title div here (part VI) -->
    <div id='banner'>
     		<h1>My First Map</h1>
     		<h2>Woohoo!</h2>
 	</div>

    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
 mapboxgl.accessToken = "pk.eyJ1IjoidGluc2VsLXNob3J0Y2FrZSIsImEiOiJjbW5ub3ZlemsxejEyMnNvZDlzNWtqdnVpIn0.aUnWOZAuOUS9Jq7V2ZwV2A";
   
        // Then initialize the map here (Part 2.2)
        var map = new mapboxgl.Map({
          container: "map", //same as div ID
          style: "mapbox://styles/mapbox/satellite-v9", //style sheet location
          center: [-122.6788, 45.5212], //start pos. [longitude, latitude]
          zoom: 11 //start zoom
        })

        // Add the zoom contols here (part V)

        map.addControl(new mapboxgl.NavigationControl({
          showCompass: false
        }), 'bottom-left');
   
        // Add popups for markers here. Yes, before the markers!  (part IV)

        var popup = new mapboxgl.Popup({offset: 25})
        .setHTML('Hello World. Welcome to Portland!');

        var popup2 = new mapboxgl.Popup({offset: 25})
        .setHTML('This is Bethany.');
        
        // Add any other variables such as markers here (part III)

        var marker = new mapboxgl.Marker({color: "green"})
          .setLngLat([-122.6788, 45.5212]) // starting position [lng, lat] 
          .setPopup(popup) //add popup w/variable 'popup' to this marker
        .addTo(map); //add open marker to map

            var popup_layer_voodoo = new mapboxgl.Popup({
          closeOnClick: true, anchor: 'top-left'})
            .setLngLat([-122.673308, 45.522675]) //popup coordinates
            .setHTML('<a href="https://www.voodoodoughnut.com">voodoo donuts</a>') //popup text
            .addTo(map);

          var marker2 = new mapboxgl.Marker({color: "red"})
          .setLngLat([-122.7, 45.5]) // starting position [lng, lat] 
          .addTo(map);

          var marker3 = new mapboxgl.Marker({color: '#BF87C0FF'})
          .setLngLat([-122.853107, 45.576111]) // starting position [lng, lat] 
          .setPopup(popup2)
          .addTo(map);

          var popup_layer_bethany = new mapboxgl.Popup({
          closeOnClick: true, anchor: 'top-left'})
            .setLngLat([-122.854, 45.577]) //popup coordinates
            .setHTML('<a href="https://www.youtube.com/watch?v=8pU7d_XzQa4">UO Canvas</a>') //popup text
            .addTo(map);


        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
